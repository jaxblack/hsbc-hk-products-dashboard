name: Deploy static dashboard to GitHub Pages

# Publishes the static dashboard (index.html + assets/ + data/products.json)
# to GitHub Pages every time main is updated. The repo's "Pages" source must
# be set to "GitHub Actions" (Settings → Pages → Source). See README for the
# one-time setup.

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "assets/**"
      - "data/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Only one Pages deploy at a time; new pushes cancel in-flight runs.
concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site root
        run: |
          set -euo pipefail
          mkdir -p _site/assets _site/data
          cp index.html _site/index.html
          cp -R assets/. _site/assets/
          cp data/products.json _site/data/products.json
          ls -la _site _site/assets _site/data

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
