<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HSBC HK Products Dashboard</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <p class="eyebrow">Prototype</p>
        <h1>HSBC HK Products Dashboard</h1>
        <p class="lead">{{ payload.disclaimer }}</p>
      </header>

      <section class="panel">
        <div class="panel-heading">
          <h2>Placeholder dataset</h2>
          <span class="badge">{{ payload.products | length }} items</span>
        </div>
        <ul class="product-list">
          {% for product in payload.products %}
          <li>
            <strong>{{ product.name }}</strong>
            <span>{{ product.category }}</span>
            <p>{{ product.note }}</p>
          </li>
          {% endfor %}
        </ul>
      </section>
    </main>
  </body>
</html>
